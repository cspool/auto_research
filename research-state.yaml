      14 balanced and 14 memory-heavy measured variants plus one smoke test.
    wall_time_min: 5
    change_summary: >
      Parsed Triton JSON, TTGIR, and PTX cache artifacts and joined static
      compiler metadata with H2.1 latency measurements.
  - experiment_id: h3_1_moe_semantic_concurrency_rtx4090
    hypothesis: H3
    metric_name: naive_expert_stream_speedup
    metric_value: 0.6818
    baseline: 1.0
