    wall_time_min: 8
    change_summary: >
      Tested balanced, skewed, and tiny four-expert single-request MoE FFN
      fragments using PyTorch expert loops and per-expert CUDA streams.
  - experiment_id: h3_2_moe_triton_epilogue_rtx4090
    hypothesis: H3
    metric_name: grouped_vs_torch_speedup
    metric_value: 18.9756
    baseline: 1.0
    delta: >
      Grouped Triton expert epilogue was 14.15x to 18.98x faster than PyTorch
      expert epilogue loops and 16.37x to 17.72x faster than per-expert Triton
      stream launches.
    wall_time_min: 10
    change_summary: >
      Compared PyTorch expert epilogue loop, per-expert Triton serial,
      per-expert Triton streams, and grouped single Triton kernel across three
      single-request MoE token distributions.
  - experiment_id: h3_3_moe_grouped_gemm_rtx4090
    hypothesis: H3
    metric_name: grouped_bmm_speedup
    metric_value: 1.3860
    baseline: 1.0
    delta: >
