    Run experiments inside the GPU Docker container. The current VS Code/Codex
    session may remain outside and invoke experiments with `docker exec`, or a
    new agent session may be started inside the container after VS Code attaches
    to `auto-research-gpu-dev`.
  docker:
    image: auto-research-gpu:cu128
    image_id: 292c3482f072
    image_size: 17.6GB
    docker_data_root: /data3/docker
    running_container: auto-research-gpu-dev
    network_mode: host
    ipc_mode: host
    project_mount: /data3/auto_research -> /workspace/auto_research
    cache_mount: /data3/auto_research_docker_cache
    codex_home_mount: /data3/auto_research_codex_home
    base_image: nvidia/cuda:12.8.0-devel-ubuntu22.04
  verified_versions:
    node: v20.20.2
    codex_cli: 0.134.0
    torch: 2.11.0+cu128
    triton: 3.6.0
  gpu_smoke_test: >
    Container PyTorch reports cuda_available=True, device_count=2,
    device0=NVIDIA GeForce RTX 4090, and a CUDA matmul smoke test succeeded.
  resume_note: >
    Read SESSION_HANDOFF.md before continuing. Prefer `docker exec
    auto-research-gpu-dev ...` for H5 GPU/profiler experiments unless starting
    a fresh Codex CLI session inside the container.

