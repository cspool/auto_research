trajectory:
  - experiment_id: h1_stream_concurrency_rtx4090
    hypothesis: H1
    metric_name: multistream_speedup
    metric_value: 1.0433
    baseline: 1.0
    delta: "+4.33% best-case; neutral/slower on other shapes"
    wall_time_min: 5
    change_summary: >
      Ran serial, multistream, and CUDA Graph baselines for independent
      model-shaped operators on RTX 4090.
  - experiment_id: h1_1_resource_shaped_streams_rtx4090
    hypothesis: H1
    metric_name: chunked_stream_speedup
    metric_value: 1.1147
    baseline: 1.0
    delta: >
      Best relative chunked stream speedup was +11.47%, but absolute latency did
      not reliably beat full-kernel multi-stream and chunk overhead was high.
    wall_time_min: 8
    change_summary: >
      Split GEMM into row chunks and compared chunked serial versus chunked
      multi-stream on three RTX 4090 shapes.
  - experiment_id: h2_triton_variant_scheduling_rtx4090
    hypothesis: H2
    metric_name: best_concurrent_differs_from_best_isolated
    metric_value: 1.0
    baseline: 0.0
    delta: >
      In two tested shapes, the fastest isolated Triton add variant differed
      from the lowest-latency concurrent variant.
    wall_time_min: 10
    change_summary: >
      Swept Triton vector-add BLOCK_SIZE and num_warps variants while running
      concurrently with GEMM on RTX 4090.
  - experiment_id: h2_1_triton_fused_microkernel_rtx4090
    hypothesis: H2
    metric_name: best_concurrent_differs_from_best_isolated
    metric_value: 1.0
    baseline: 0.0
    delta: >
      Fused GELU/residual Triton micro-kernel beat PyTorch eager unfused by
      1.91x to 2.61x. Balanced shape showed a meaningful best-isolated versus
      best-concurrent split; memory-heavy shape showed that best stream speedup
      can select a worse absolute latency.
    wall_time_min: 10
    change_summary: >
      Swept Triton fused epilogue variants under GEMM co-scheduling and compared
      isolated latency, concurrent latency, and stream-speedup objectives.
  - experiment_id: h2_2_triton_compiler_metadata
    hypothesis: H2
    metric_name: recovered_compiler_metadata_variants
    metric_value: 29
    baseline: 0
    delta: >
