# AutoResearch State — Multi-Operator Concurrency for Single-Accelerator Inference
# Created: 2026-05-25

meta:
  question: >
    How to achieve multi-operator / micro-operator concurrency for single-request
    model inference (MoE, wavelet-Diffusion, DiT, multimodal, Video) on a single
    GPU/NPU/accelerator backend? Focus on hardware architecture and compilation
    framework methods/implementations.
  status: h4-8-query-aware-selector-supported
  started: 2026-05-25
  last_updated: 2026-05-27
  continuity:
    requested: autoresearch loop
    status: fallback-recorded
    note: >
      This session did not expose /loop or cron.add, so agent continuity could
      not be installed. Continue by reading research-state.yaml and findings.md.
  literature_source_policy: local-notes-only for bootstrap

phase: h4_selected_token_shape_next

hypotheses:
  - id: H1
    title: Stream concurrency alone is insufficient for single-request inference
    prediction: >
      Multi-stream execution will show limited overlap unless kernels are
      resource-complementary or spatially constrained.
    status: preliminary_supported
    evidence: >
      RTX 4090 microbenchmark showed multi-stream speedup from 0.997x to 1.043x
      and overlap ratio from -0.1% to 6.0% across three shapes.
  - id: H2
    title: Micro-operator tiling plus multi-version kernels improves scheduling
    prediction: >
      Runtime selection among resource-diverse micro-kernels will outperform
      generic operator fusion on heterogeneous operator chains.
    status: strengthened
    evidence: >
      Triton vector-add variants showed that the fastest isolated micro-kernel
      was not the lowest-latency concurrent variant on both balanced and
      memory-heavy RTX 4090 shapes. A fused GELU/residual micro-kernel then
      showed the same objective separation on a more model-shaped operator
      fragment, while also exposing that stream_speedup can be inflated by a
      slower serial baseline. Triton cache artifact analysis recovered tile
      size, warps, thread count, shared memory, PTX register declarations, and
      code-size metadata for all fused variants, giving an implementation path
      for runtime variant tables.
  - id: H3
    title: Model-semantic decomposition exposes stronger concurrency
    prediction: >
      MoE experts, diffusion patches/dGraphs, multimodal modules, and video KV
      retrieval expose concurrency not visible to a generic tensor graph.
    status: strongly_supported_moe_branch
    evidence: >
      A tiny single-request MoE FFN fragment showed that expert branches are
      semantic units, but naive PyTorch one-stream-per-expert execution was
      slower than serial execution across balanced, skewed, and tiny token
      distributions. A Triton grouped expert epilogue micro-operator then beat
      PyTorch expert epilogue loops by 14.15x to 18.98x and per-expert Triton
      streams by 16.37x to 17.72x, supporting the refined claim that MoE
      semantics become useful when lowered into grouped compiler-visible units.
      Padded grouped expert GEMM was also positive but modest, with 1.08x to
      1.39x speedup; skewed routing reduced the benefit due to padding overhead.
      A no-padding Triton expert-tiled matmul recovered this boundary, beating
      padded bmm by 1.12x to 1.31x and expert loops by 1.28x to 1.48x across
      balanced, skewed, and tiny distributions. Adding explicit scatter/gather
      around the no-padding grouped FFN still beat the PyTorch routed expert
      loop by 1.39x to 1.64x; routing movement consumed about 21% to 23% of
      full routed latency.
  - id: H4
    title: Irregular video/VLM workloads need hardware-aware or hardware-assisted scheduling
    prediction: >
      Branch-heavy token selection and KV retrieval will bottleneck GPU-only
      execution unless restructured into tile-local or accelerator-native units.
    status: strongly_supported_sparse_attention_branch
    evidence: >
      A sparse video/VLM KV retrieval score fragment showed that per-segment
      PyTorch execution is launch-bound: a 32-segment loop was 52x to 64x
      slower than a fused Triton gather-score kernel. Flattening selected
      indices into PyTorch gather+GEMM helped greatly, but selected-K gather
      still accounted for 43% to 46% of flat latency. Fused Triton avoided the
      materialized gathered-K buffer and beat flat PyTorch by 1.15x to 1.35x.
      A locality/order sweep then showed fused Triton remained 1.37x to 1.42x
      faster than flat PyTorch across random, sorted, shuffled, and clustered
      selected-token orders, while the best tile variant changed with order.
      Extending the proxy to score-softmax-value made the fusion benefit much
      stronger: a single-tile Triton sparse attention fragment beat flat PyTorch
      eager by 5.78x to 6.79x across the same order modes. A two-stage
      multi-block online-softmax Triton prototype then scaled the sparse
      attention fragment to 1024 selected tokens and still beat flat PyTorch by
      2.99x to 4.76x. A grouped-query extension with Q=4 then beat flat PyTorch
      by 2.86x to 3.64x and measured per-query repeated online-softmax kernels
      by 3.41x to 3.66x, while exposing shared-memory feasibility as a runtime
      table constraint. A runtime-table prototype then rejected all observed
      shared-memory OOR variants and selected near-best valid variants in 3/4
      order modes with a global latency table, or 4/4 with an order-aware table.
      On held-out query counts Q=2 and Q=8, the same static filter rejected all
      observed OOR variants and the order-aware table stayed within 15% of
      measured best in 7/8 cases, exposing query-count pressure as the next
      selector feature. Adding query-count, num_q_blocks, and query-pressure
      features then fixed that miss and selected measured-best valid variants in
      all 8/8 held-out query-count cases.

experiments_completed: 18
inner_loop_iterations: 18
outer_loop_iterations: 4

current_direction: >
  Deepen H4 with H4.9: test selected-token-count held-out shapes, such as 512
  and 2048 selected tokens at Q=4. Evaluate whether the H4.8 runtime table still
  chooses near-best valid variants; if it misses, add num_n_blocks and selected
  token/blocking pressure as selector features.

