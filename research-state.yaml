      best latency varied only about 2.1%; best tile variants differed by order.
    wall_time_min: 10
    change_summary: >
      Swept selected-token order and six Triton tile variants for the sparse
      video/VLM KV retrieval score proxy.
  - experiment_id: h4_3_kv_score_softmax_value_rtx4090
    hypothesis: H4
    metric_name: best_triton_vs_flat_speedup
    metric_value: 6.7859
    baseline: 1.0
    delta: >
      Single-tile fused Triton score-softmax-value sparse attention beat flat
      PyTorch eager by 5.78x to 6.79x across random segment, globally sorted,
      globally shuffled, and clustered segment orders.
    wall_time_min: 12
    change_summary: >
      Extended sparse KV retrieval from score-only to a single-query attention
      fragment with K/V gather, score, softmax, and value aggregation.
  - experiment_id: h4_4_kv_online_softmax_rtx4090
    hypothesis: H4
    metric_name: best_triton_vs_flat_speedup
    metric_value: 4.7598
    baseline: 1.0
    delta: >
      Two-stage multi-block online-softmax Triton sparse attention beat flat
      PyTorch eager by 2.99x to 4.76x on a 1024-selected-token single-query
      fragment across random segment, sorted, shuffled, and clustered orders.
    wall_time_min: 12
    change_summary: >
      Implemented partial max/denominator/value kernels plus an online-softmax
      reduce kernel to scale sparse score-softmax-value beyond the H4.3
      single-tile limit.
  - experiment_id: h4_5_kv_multi_query_rtx4090
    hypothesis: H4
    metric_name: best_triton_vs_flat_speedup
    metric_value: 3.6396
    baseline: 1.0
    delta: >
      Grouped-query two-stage Triton sparse attention beat flat PyTorch eager by
      2.86x to 3.64x and beat measured per-query repeated online-softmax kernels
      by 3.41x to 3.66x across four selected-token orders.
    wall_time_min: 12
    change_summary: >
      Extended the H4.4 online-softmax sparse attention prototype to Q=4 shared
      selected K/V queries, measured repeated single-query launches, and
      recorded shared-memory infeasible variants.
  - experiment_id: h4_6_runtime_variant_table
    hypothesis: H4
    metric_name: near_best_order_count
    metric_value: 4
    baseline: 3
    delta: >
      Static feasibility rejected 4/4 observed shared-memory OOR rows. A global
      mean latency table selected within 10% of measured best in 3/4 order
      modes, while an order-aware rule table selected within 10% in 4/4 modes.
    wall_time_min: 5
    change_summary: >
      Built a compiler/runtime variant-table prototype from H4.5 CSV artifacts,
      joining tile metadata, shared-memory proxy, order statistics, and measured
      grouped sparse-attention latency.
  - experiment_id: h4_7_variant_table_heldout_query_counts
    hypothesis: H4
    metric_name: heldout_near_best_count
    metric_value: 7
    baseline: 8
    delta: >
      On held-out Q=2 and Q=8 grouped sparse-attention sweeps, static filtering
      rejected 8/8 observed OOR rows. The H4.6 order-aware selector was within
      15% of measured best in 7/8 cases and improved mean regret over the global
      mean selector.
    wall_time_min: 10
    change_summary: >
      Ran eight held-out query-count GPU sweeps and evaluated the H4.6 runtime
      variant table without retuning, revealing that Q=8 clustered_segment needs
      query-count-aware value-blocking/warps selection.
  - experiment_id: h4_8_query_aware_selector
    hypothesis: H4
    metric_name: heldout_near_best_count
    metric_value: 8
    baseline: 7
    delta: >
      Adding query_count, num_q_blocks, and query_count / BLOCK_Q fixed the Q=8
      clustered_segment miss and selected measured-best valid variants in 8/8
      H4.7 held-out query-count cases.
    wall_time_min: 5
    change_summary: >
      Built a query-count-aware runtime rule table over H4.7 measurements while
      preserving static feasibility filtering and order-statistics classes.

