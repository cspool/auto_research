    delta: >
      Fused Triton gather-score beat flat PyTorch gather+GEMM by 1.15x to 1.35x
      and beat per-segment PyTorch loops by 52x to 64x across balanced, skewed,
      and tiny sparse retrieval distributions.
    wall_time_min: 10
    change_summary: >
      Implemented a sparse video/VLM KV retrieval score proxy with semantic
